const fmt = (value, decimals = 0) =>
  value == null
    ? null
    : Number(value).toLocaleString("es-CL", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      });

function color(value) {
  const { colors, vmin, vmax } = CONFIG;
  const t = Math.min(Math.max((value - vmin) / (vmax - vmin), 0), 1);
  const position = t * (colors.length - 1);
  const index = Math.min(Math.floor(position), colors.length - 2);
  const mix = position - index;

  const rgb = (hex) => [1, 3, 5].map((i) => parseInt(hex.slice(i, i + 2), 16));
  const [a, b] = [rgb(colors[index]), rgb(colors[index + 1])];

  return `rgb(${a.map((c, i) => Math.round(c + (b[i] - c) * mix)).join(",")})`;
}

function popupHtml(listing) {
  const rows = [
    ["Precio", fmt(listing.price_uf) && fmt(listing.price_uf) + " UF"],
    ["", fmt(listing.price_clp) && "$" + fmt(listing.price_clp)],
    ["Superficie", fmt(listing.m2_utiles) && fmt(listing.m2_utiles) + " m²"],
    ["UF/m²", fmt(listing.uf_per_m2, 1)],
    ["Zona UF/m²", fmt(listing.zona_uf_m2)],
    ["Dormitorios", fmt(listing.bedrooms_n)],
    ["Estacionamientos", fmt(listing.parking)],
    ["Gastos comunes", fmt(listing.gastos_comunes_clp) && "$" + fmt(listing.gastos_comunes_clp)],
    ["Barrio", listing.barrio],
    ["Publicado desde", listing.first_seen_date],
  ];

  const lines = rows
    .filter(([, value]) => value != null)
    .map(([label, value]) =>
      label ? `<div><b>${label}:</b> ${value}</div>` : `<div>${value}</div>`
    )
    .join("");

  return `<div class="popup">
    <a href="${listing.url}" target="_blank">${listing.title}</a>
    <div class="rows">${lines}</div>
  </div>`;
}

const map = L.map("map");

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution:
    '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> ' +
    '&copy; <a href="https://carto.com/attributions">CARTO</a>',
}).addTo(map);

map.setView(
  [
    LISTINGS.reduce((sum, l) => sum + l.lat, 0) / LISTINGS.length,
    LISTINGS.reduce((sum, l) => sum + l.lng, 0) / LISTINGS.length,
  ],
  14
);

const markers = LISTINGS.map((listing) => ({
  listing,
  marker: L.circleMarker([listing.lat, listing.lng], {
    radius: 6,
    color: "#fcfcfb",
    weight: 1,
    fill: true,
    fillColor: color(listing.uf_per_m2),
    fillOpacity: 0.9,
  })
    .bindTooltip(`${fmt(listing.uf_per_m2, 1)} UF/m² · ${fmt(listing.price_uf)} UF`)
    .bindPopup(popupHtml(listing), { maxWidth: 320 }),
}));

// filters
const priceMin = document.getElementById("price-min");
const priceMax = document.getElementById("price-max");
const m2Min = document.getElementById("m2-min");
const m2Max = document.getElementById("m2-max");
const parkingOnly = document.getElementById("parking-only");

const prices = LISTINGS.map((l) => l.price_clp);
const step = 5_000_000;
priceMin.min = priceMax.min = Math.floor(Math.min(...prices) / step) * step;
priceMin.max = priceMax.max = Math.ceil(Math.max(...prices) / step) * step;
priceMin.step = priceMax.step = step;
priceMin.value = priceMin.min;
priceMax.value = priceMax.max;

const areas = LISTINGS.map((l) => l.m2_utiles);
m2Min.min = m2Max.min = Math.floor(Math.min(...areas));
m2Min.max = m2Max.max = Math.ceil(Math.max(...areas));
m2Min.value = m2Min.min;
m2Max.value = m2Max.max;

function updateDual(minEl, maxEl, fillId) {
  const bounds = [Number(minEl.min), Number(minEl.max)];
  const pct = (v) => ((v - bounds[0]) / (bounds[1] - bounds[0])) * 100;

  const fill = document.getElementById(fillId);
  fill.style.left = pct(Number(minEl.value)) + "%";
  fill.style.width = pct(Number(maxEl.value)) - pct(Number(minEl.value)) + "%";

  // when both thumbs sit at the top end only the upper input is clickable,
  // so raise the lower one above it on the upper half of the track
  minEl.style.zIndex = Number(minEl.value) > (bounds[0] + bounds[1]) / 2 ? 3 : 1;
}

function applyFilters() {
  // keep min/max handle pairs from crossing
  if (Number(priceMin.value) > Number(priceMax.value)) {
    if (this === priceMin) priceMax.value = priceMin.value;
    else priceMin.value = priceMax.value;
  }
  if (Number(m2Min.value) > Number(m2Max.value)) {
    if (this === m2Min) m2Max.value = m2Min.value;
    else m2Min.value = m2Max.value;
  }

  document.getElementById("price-value").textContent =
    `$${fmt(priceMin.value / 1e6)}M – $${fmt(priceMax.value / 1e6)}M`;
  document.getElementById("m2-value").textContent =
    `${m2Min.value} – ${m2Max.value}`;

  updateDual(priceMin, priceMax, "price-fill");
  updateDual(m2Min, m2Max, "m2-fill");

  let visible = 0;

  for (const { listing, marker } of markers) {
    const show =
      listing.price_clp >= Number(priceMin.value) &&
      listing.price_clp <= Number(priceMax.value) &&
      listing.m2_utiles >= Number(m2Min.value) &&
      listing.m2_utiles <= Number(m2Max.value) &&
      (!parkingOnly.checked || listing.parking >= 1);

    if (show) {
      marker.addTo(map);
      visible += 1;
    } else {
      marker.remove();
    }
  }

  document.getElementById("subtitle").textContent =
    `${visible} de ${LISTINGS.length} departamentos <${CONFIG.maxM2} m² ` +
    `vistos por primera vez en los últimos ${CONFIG.recentDays} días · ${CONFIG.updated}`;
}

for (const input of [priceMin, priceMax, m2Min, m2Max, parkingOnly]) {
  input.addEventListener("input", applyFilters);
}

applyFilters();

// legend
document.getElementById("legend-bar").style.background =
  `linear-gradient(to right, ${CONFIG.colors.join(",")})`;
document.getElementById("legend-min").textContent = fmt(CONFIG.vmin);
document.getElementById("legend-max").textContent = fmt(CONFIG.vmax);
</script>
</body>
</html>
